# workflows adapted from the WLED project using PlatformIO
name: LampOS Build

# Only included into the release workflows, which pass a beta or stable channel
# plus the firmware + command signing secrets. sign_firmware.py signs for those
# channels and FATALs if a key is missing.
on:
  workflow_call:
    inputs:
      channel:
        description: Firmware channel — `stable` or `beta`. Composed into
          the LSIG footer's channel slot as `{variant}-{channel}`.
        required: false
        type: string
        default: stable
    secrets:
      LAMP_FIRMWARE_PRIVATE_KEY_HEX:
        description: 32-byte Ed25519 firmware-signing seed as 64 hex chars
        required: false
      LAMP_COMMAND_KEY_HEX:
        description: 32-byte MSG_EVENT/MSG_COMMAND auth key as 64 hex chars
        required: false

jobs:

  build:
    name: Build Lamp (${{ matrix.lamp_variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lamp_variant: [standard, snafu]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version: '3.12'
          cache: 'pip'
    - name: Install PlatformIO + signing deps
      run: pip install -r requirements.txt

    - name: Materialize firmware signing key
      env:
        KEY_HEX: ${{ secrets.LAMP_FIRMWARE_PRIVATE_KEY_HEX }}
      run: |
        if [ -n "$KEY_HEX" ]; then
          printf '%s' "$KEY_HEX" | xxd -r -p > "$HOME/.lamp-os-firmware-key.bin"
          chmod 600 "$HOME/.lamp-os-firmware-key.bin"
          echo "[ci] signing key materialized at ~/.lamp-os-firmware-key.bin"
        else
          echo "[ci] no signing key; a beta/stable build will FATAL at sign"
        fi

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: software/lamp-ui/package-lock.json

    # Builds the web UI bundle into software/lamp-os/data/index.html.gz so the
    # buildfs step below packs it into spiffs.bin. Must run before buildfs.
    - name: Build web UI
      working-directory: ./software/lamp-ui
      run: |
        npm ci
        npm run build

    - name: Build lamp firmware (${{ matrix.lamp_variant }})
      working-directory: ./software/lamp-os
      env:
        LAMP_FIRMWARE_CHANNEL: ${{ inputs.channel }}
        LAMP_COMMAND_KEY_HEX: ${{ secrets.LAMP_COMMAND_KEY_HEX }}
      run: |
        pio run --environment upesy_wroom_${{ matrix.lamp_variant }}
        pio run --target buildfs --environment upesy_wroom_${{ matrix.lamp_variant }}

    - name: Merge lamp firmware for USB-flash distribution.bin
      working-directory: ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}
      run: |
        esptool --chip esp32 merge-bin -o distribution.bin --flash-mode dio --flash-freq 40m --flash-size 4MB 0x1000 bootloader.bin 0x8000 partitions.bin 0x10000 firmware.bin 0x3D0000 spiffs.bin

    - name: Upload lamp USB-flash distribution.bin (${{ matrix.lamp_variant }})
      uses: actions/upload-artifact@v4
      with:
        name: distribution-${{ matrix.lamp_variant }}
        path: |
          ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}/distribution.bin

    - name: Upload lamp partition images (${{ matrix.lamp_variant }})
      uses: actions/upload-artifact@v4
      with:
        name: updates-${{ matrix.lamp_variant }}
        path: |
          ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}/bootloader.bin
          ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}/partitions.bin
          ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}/firmware.bin
          ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}/spiffs.bin

    - name: Upload signed lamp firmware (${{ matrix.lamp_variant }})
      if: inputs.channel != 'dev'
      uses: actions/upload-artifact@v4
      with:
        name: lamp-firmware-${{ matrix.lamp_variant }}-signed
        path: |
          ./software/lamp-os/.pio/build/upesy_wroom_${{ matrix.lamp_variant }}/firmware-signed.bin

  build-wisp:
    name: Build Wisp
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version: '3.12'
          cache: 'pip'
    - name: Install PlatformIO + signing deps
      run: pip install -r requirements.txt

    - name: Materialize firmware signing key
      env:
        KEY_HEX: ${{ secrets.LAMP_FIRMWARE_PRIVATE_KEY_HEX }}
      run: |
        if [ -n "$KEY_HEX" ]; then
          printf '%s' "$KEY_HEX" | xxd -r -p > "$HOME/.lamp-os-firmware-key.bin"
          chmod 600 "$HOME/.lamp-os-firmware-key.bin"
        else
          echo "[ci] no signing key; a beta/stable build will FATAL at sign"
        fi

    - name: Build wisp firmware
      working-directory: ./software/wisp
      env:
        LAMP_FIRMWARE_CHANNEL: ${{ inputs.channel }}
      run: pio run --environment seeed_xiao_esp32_c6

    - name: Upload signed wisp firmware
      if: inputs.channel != 'dev'
      uses: actions/upload-artifact@v4
      with:
        name: wisp-firmware
        path: |
          ./software/wisp/.pio/build/seeed_xiao_esp32_c6/firmware-signed.bin
