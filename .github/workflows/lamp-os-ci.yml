# workflows adapted from the WLED project using PlatformIO
name: LampOS CI

# Compile + native-test gate for PRs and non-dev branch pushes. The full
# distribution build (build.yml) is reserved for releases — not run per PR.
on:
  push:
    branches-ignore:
      - dev
  pull_request:

jobs:
  check:
    name: Compile + native tests (lamp + wisp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install PlatformIO
        run: pip install -r requirements.txt
      # wisp native crypto test links libmbedcrypto. The wisp env's homebrew
      # -I/-L paths don't exist on the runner and are ignored; -lmbedcrypto
      # resolves against this system package on the default search path.
      - name: Install mbedtls
        run: sudo apt-get update && sudo apt-get install -y libmbedtls-dev
      - name: Compile lamp firmware
        run: npm run lamp:build
      - name: Lamp native tests
        run: npm run lamp:test
      - name: Compile wisp firmware
        run: npm run wisp:build
      - name: Wisp native tests
        run: npm run wisp:test
