# workflows adapted from the WLED project using PlatformIO
name: LampOS CI

# Compile + native-test gate for PRs and non-dev branch pushes. The full
# distribution build (build.yml) is reserved for releases — not run per PR.
on:
  push:
    branches-ignore:
      - dev
  pull_request:

jobs:
  check:
    name: Compile + native tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install PlatformIO
        run: pip install -r requirements.txt
      - name: Compile firmware
        # No signing key in CI; sign_firmware.py no-ops on this flag (the PR
        # gate only needs a clean compile, not a signed image).
        env:
          LAMP_FIRMWARE_SKIP_SIGN: '1'
        run: npm run lamp:build
      - name: Native tests
        run: npm run lamp:test
