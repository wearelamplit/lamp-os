# Publishes the firmware-flasher site (update.lamplit.ca) to GitHub Pages
# from docs/update-site/.
#
# ONE-TIME SETUP REQUIRED: in repo Settings -> Pages, set
# "Build and deployment -> Source" to "GitHub Actions". This replaces the
# legacy "Deploy from a branch: main /docs" config (which could only serve
# / or /docs, not a subfolder). Until that switch is made this workflow is
# inert and the old branch-deploy keeps serving — so there is no outage
# window when the two land together.
name: Deploy flasher site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/update-site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight run finish rather than cancel
# (a half-published flasher site is worse than a slightly delayed one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/update-site
      - id: deployment
        uses: actions/deploy-pages@v4
