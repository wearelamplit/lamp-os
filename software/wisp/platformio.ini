; PioArduino Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
build_cache_dir = ./.buildcache
data_dir = ./data
default_envs = seeed_xiao_esp32_c6

[env:seeed_xiao_esp32_c6]
lib_ldf_mode = chain
lib_compat_mode = strict
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-2/platform-espressif32.zip
framework = arduino
board = seeed_xiao_esp32c6
lib_deps =
	h2zero/NimBLE-Arduino@2.3.6
	nanopb/Nanopb @ ^0.4.8
	gilmaimon/ArduinoWebsockets @ ^0.5.4
	bblanchon/ArduinoJson @ ^7.0.4
	adafruit/Adafruit NeoPixel @ ^1.12.0

build_flags =
	; optimize for performance
	-O2

	; enable compiler warnings
	-Wall
	-Wextra

	; Arduino debugging options
	-D NDEBUG
	-D CORE_DEBUG_LEVEL=5

	; Aurora vendored sources live under src/aurora/. The reference uses bare
	; "PaletteList.h"-style includes, so the include path mirrors the reference's
	; layout one level deeper.
	-I src
	-I src/aurora
	-I src/aurora/proto
	-I lib/miniz
	-D PB_FIELD_32BIT=1

; Standard ESP32-C6 4 MB OTA-able partition table (two ~1.9 MB app
; slots + 64 KB SPIFFS + coredump). The wisp doesn't gossip-OTA today —
; lamps do — but keeping a self-OTA-capable layout leaves room for a
; future wisp-BLE-direct OTA without another partition migration.
board_build.partitions = partitions.csv

; Post-build: append the LSIG footer (ed25519-signed) so wisp firmware
; remains tamper-evident on disk. No consumer in CI today (wisp drops out
; of OTA per the gossip design), but the hook stays so a future wisp
; self-OTA path doesn't need to re-add it.
extra_scripts =
    post:../../scripts/sign_firmware.py

; Host-side unit tests (pure-logic only): palette JSON parse + notification
; codec roundtrip. Arduino-coupled glue (MeshLink, LampInventory, main, and the
; Aurora networking files) is excluded from the source filter.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
	+<*>
	-<main.cpp>
	-<MeshLink.cpp>
	-<LampInventory.cpp>
	-<CurrentPalette.cpp>
	-<PaintDistributor.cpp>
	-<StatusBeacon.cpp>
	-<WispConfig.cpp>
	-<WispOpDispatcher.cpp>
	-<WifiLink.cpp>
	-<StageBeacon.cpp>
	-<ArtnetEmitter.cpp>
	-<aurora/AuroraDiscovery.cpp>
	-<aurora/AuroraWsConnection.cpp>
	-<aurora/PaletteFetcher.cpp>
	-<aurora/AuroraPaletteClient.cpp>
lib_deps =
	nanopb/Nanopb @ ^0.4.8
	bblanchon/ArduinoJson @ ^7.0.4
build_flags =
	-I src
	-I src/aurora
	-I src/aurora/proto
	-I lib/miniz
	-D PB_FIELD_32BIT=1
	-std=gnu++17
