syntax = "proto2";

package aurora;

// Local copy of google.protobuf.Any (identical wire layout).
message Any {
  optional string type_url = 1;
  optional bytes  value    = 2;
}

enum NotificationType {
  INSTANCE_INFO          = 1;
  GLOBAL_STATE           = 5;
  PALETTE_STATE          = 6;
  CACHE_INVALIDATE       = 13;
  LIVE_DATA_SUBSCRIPTION = 20;
  PATTERN_STATE          = 33;
}

enum SubscriptionAction {
  SUBSCRIBE   = 1;
  UNSUBSCRIBE = 2;
  REPLACE     = 3;
}

message NotificationEnvelope {
  optional NotificationType type        = 1;
  optional Any              msg         = 2;
  optional string           instance_id = 3;
}

message InstanceInfo {
  optional string instance_id = 1;
}

message NotificationSubscription {
  optional string             subscription_id = 1;
  optional NotificationType    type           = 2;
  optional SubscriptionAction  action         = 3;
  // filter (field 4, Any) intentionally omitted: we send no filters.
}

message NotificationSubscriptionRequest {
  repeated NotificationSubscription subscriptions = 1;
  optional bool                     replace_all   = 2;
}

// zone/enum fields declared as int32 to avoid importing pattern.proto.
message ZonePaletteState {
  optional int32  zone                    = 1;
  optional string active_color_palette_id = 2;
  optional string active_fx_snapshot_id   = 3;
}

message PaletteState {
  repeated ZonePaletteState states                = 1;
  optional string           fx_snapshot_id_preview = 2;
}

// Trimmed: only scalar fields we surface; nested params/transitions skipped.
message PatternState {
  optional int32  mode            = 1;
  optional int32  status          = 2;
  optional int32  play_index      = 8;
  optional string show_id         = 9;
  optional bool   preview_enabled = 11;
}
