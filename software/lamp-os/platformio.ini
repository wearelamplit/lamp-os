; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Global cache is harmless for [env:native] but is per-variant DISABLED
; below — see comment on `build_cache_dir =` in each upesy_wroom_<variant>
; block. Tracked locally (.gitignored) so it doesn't pollute commits.
build_cache_dir = ./.buildcache
data_dir = ./data
default_envs = upesy_wroom_standard

[env:native]
platform = native
lib_deps =
	bblanchon/ArduinoJson@7.4.2
build_flags =
	-std=gnu++2a
	-std=c++2a
	-I src
build_unflags =
	-fno-rtti
	-std=gnu++11

; Shared base for all upesy_wroom_<variant> envs. Per-variant envs `extends =`
; this section to inherit scalar keys (board, lib_ldf_mode, platform, etc.)
; AND interpolate ${env_base_upesy.build_flags|build_src_filter|lib_deps} to
; bring the list-typed keys forward (extends does NOT merge lists).
[env_base_upesy]
board = upesy_wroom
lib_ldf_mode = chain
lib_compat_mode = strict
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
; Match the firmware's Serial.begin(115200) so `pio device monitor` (no flags)
; doesn't decode the lamp's logs as garbage.
monitor_speed = 115200
; Exclude both variant directories from the default source set. The
; per-variant env re-includes its own directory via `+<lamps/<type>/>`
; in build_src_filter — guarantees the unused variant's source NEVER
; compiles in (don't rely on linker --gc-sections to strip it).
build_src_filter =
	+<*>
	-<lamps/standard/>
	-<lamps/snafu/>
lib_deps =
	adafruit/Adafruit NeoPixel@1.15.2
	bblanchon/ArduinoJson@7.4.2
	h2zero/NimBLE-Arduino@2.3.6
	ESP32Async/ESPAsyncWebServer@3.8.1
	ESP32Async/AsyncTCP@3.4.9


build_flags =
	; Firmware version components for version.hpp
	-D LAMP_FW_MAJOR=1
	-D LAMP_FW_MINOR=0
	-D LAMP_FW_PATCH=165

	-D LAMP_WEBAPP_ENABLED=1
	-D LAMP_WEBAPP_BOOT_WINDOW_MS=120000
	-D LAMP_WEBAPP_IDLE_TIMEOUT_MS=120000

	; FS-image OTA (deliver the SPIFFS web-UI image over the mesh to the spiffs
	; partition). Ships dark: the FS receiver/distributor instance, MSG_FS_*
	; dispatch, HELLO_TLV_FS_STATE, and the SPIFFS write-safety change all
	; compile out at 0, leaving the firmware OTA path unchanged. Flip to 1 for a
	; bench build to validate A->B before enabling on a shipped channel.
	-D LAMP_FS_OTA_ENABLED=0

	; optimize for performance
	-O2

	; source-rooted includes — write #include "config/config.hpp" instead of ../../config/config.hpp
	-I src

	; enable compiler warnings
	-Wall
	-Wextra

	; Increase radio power for bluetooth. should be modified in tandem with bluetooth.h constants
	-D MYNEWT_VAL_BLE_LL_TX_PWR_DBM=4

	; Per-characteristic ATT value cap. NimBLE-Arduino's default is 512
	; AND it clamps any per-char `max_len` argument against this value
	; inside the library's own .cpp (see NimBLEAttValue.cpp line 34:
	; `m_attr_max_len{std::min(BLE_ATT_ATTR_MAX_LEN, max_len)}`). So the
	; only way to raise the per-char cap is to recompile the LIBRARY
	; with this define in scope. build_flags here DOES reach lib compile,
	; BUT note the `build_cache_dir = ./.buildcache` at the top: when this
	; macro changes, you MUST `rm -rf .buildcache .pio/build` and rebuild
	; or the cached NimBLEAttValue.cpp.o will silently reuse the old cap.
	; A bare `pio run -t clean` does NOT clear .buildcache.
	;
	; The persisted-knockout base section can hit ~672 bytes on lamps with
	; a full knockout pattern; 1024 leaves ~50% headroom. RAM cost is
	; ~512 bytes per characteristic the value buffer for, allocated lazily
	; on setValue — negligible.
	;
	; Lamps with many expressions (>5) can also breach 1024 via
	; CHAR_EXPR_SECTION. Pagination (per-index protocol + cursor) is the
	; architectural fix; until that lands, this cap is the operative
	; ceiling for expression count growth.
	-D BLE_ATT_ATTR_MAX_LEN=1024

	; LAMP_DEBUG (bench affordances + debug serial) is injected per-channel
	; by inject_firmware_channel.py — on for beta/dev builds, off for stable.
	; Don't hardcode it here.

	-D NDEBUG
	; 0=none 1=error 2=warn 3=info 4=debug 5=verbose
	-D CORE_DEBUG_LEVEL=2

	; Panic-handler, NimBLE host-task stack, and coredump settings are
	; now configured via `custom_sdkconfig` below (single source of truth
	; in the regenerated IDF sdkconfig.h, rather than -D build_flags that
	; collided with the regenerated sdkconfig.h when pioarduino is in
	; arduino-as-IDF-component mode).

	; (Arduino-ESP32 already wraps esp_panic_handler; we register via
	; set_arduino_panic_handler() in src/core/panic_handler.cpp instead.)

	; SW coex stays ENABLED (IDF default). The disable path was attempted
	; for cascade-reliability under BLE+ESP-NOW contention but the BLE
	; controller failed to init (esp_bt_controller_init err=259) on the
	; original ESP32 once the HybridCompile actually rebuilt libcoexist.
	; Cascade reliability is handled via the Commit E gossip-relay
	; instead. See `custom_sdkconfig` below for the active settings.

; Hybrid-compile: trigger pioarduino to rebuild the IDF static libs
; (libesp_system.a, libcoexist.a, libbt.a, libespcoredump.a, ...) with
; these overrides applied to its sdkconfig.defaults. Without this the
; precompiled libs ship with the upstream Espressif defaults baked in,
; and -D build_flags can only affect our own source-file compilation —
; not the linked-in archive.
;
; Picked up via platform-espressif32 55.03.39 (Jun 2026), which fixes
; upstream pioarduino issues #495 (--wrap=log_printf in HybridCompile)
; and #496 (outer SCons rerun on half-baked env) that previously
; blocked this flow on 55.03.30-2 (Aug 2025).
;
; Kconfig syntax: `=y`/`=n` for booleans, numeric values flow direct,
; and `# CONFIG_X is not set` is the Kconfig sentinel form required to
; disable some flags (the literal `=n` is not always accepted).
custom_sdkconfig =
	# IWDT widened to 1000ms for JIT-erase headroom (W25Q worst-case sector erase ~400ms)
	CONFIG_ESP_INT_WDT_TIMEOUT_MS=1000
	# Panic handler: print backtrace + reboot, no OCD wait
	CONFIG_ESP_SYSTEM_PANIC_PRINT_REBOOT=y
	# CONFIG_ESP_DEBUG_OCDAWARE is not set
	# Coredump-to-flash is intentionally disabled — the SPIFFS partition
	# (restored 2026-06-25) occupies what would have been the coredump
	# region. Panic dumps still print to UART (CONFIG_ESP_SYSTEM_PANIC_*
	# above). Re-enable + carve a coredump partition if persistent-dump
	# becomes a real bench need; trade-off was ~64 KB of usable SPIFFS
	# vs. post-mortem flash storage.
	# CONFIG_ESP_COREDUMP_ENABLE_TO_FLASH is not set
	# NimBLE host task stack 8KB (default 4KB)
	CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
	# SW coexistence stays ENABLED — see comment in build_flags above.

; The Insights / RainMaker / Diagnostics components ship via the
; pioarduino bundled-lib path and previously leaked into the source
; build (cert-embed bug + redef cascade in HybridCompile mode). The
; project doesn't use any of them; strip them out so component-manager
; doesn't pull them in.
custom_component_remove =
	espressif/esp_insights
	espressif/esp_diagnostics
	espressif/esp_diag_data_store
	espressif/esp_rainmaker
	espressif/rmaker_common

; custom partitions for lamps to support ota
board_build.partitions = ./partitions.csv
board_build.filesystem = spiffs
monitor_filters = esp32_exception_decoder

; Post-build: append the LSIG footer (ed25519-signed) so the wisp embed
; step has a verifiable firmware.bin to carry. See scripts/sign_firmware.py
; + scripts/README.md for the full OTA pipeline.
extra_scripts =
  pre:scripts/inject_initial_type.py
  pre:scripts/inject_firmware_channel.py
  post:../../scripts/sign_firmware.py
  ; Pre-buildfs: write data/fw.lsig before mkspiffs packs the SPIFFS image so
  ; the FS OTA carries an ed25519 signature. No-ops under LAMP_FIRMWARE_SKIP_SIGN.
  ../../scripts/sign_fs.py

; ============================================================================
; Per-variant envs. `custom_lamp_variant = <name>` is the single source of
; truth that the pre-/post-build hooks read via env.GetProjectOption().
; `build_cache_dir =` is disabled per variant because PIO's compile cache
; has bitten this codebase before on similar -D toggles (see the
; BLE_ATT_ATTR_MAX_LEN comment above). Cold-build cost is small; correctness
; non-negotiable — a wrong-variant binary is the safety bug this whole
; design is closing.
; ============================================================================

[env:upesy_wroom_standard]
extends = env_base_upesy
custom_lamp_variant = standard
build_src_filter =
	${env_base_upesy.build_src_filter}
	+<lamps/standard/>
build_flags =
	${env_base_upesy.build_flags}
	-D LAMP_BUILD_VARIANT_STANDARD=1
lib_deps =
	${env_base_upesy.lib_deps}
build_cache_dir =

[env:upesy_wroom_snafu]
extends = env_base_upesy
custom_lamp_variant = snafu
build_src_filter =
	${env_base_upesy.build_src_filter}
	+<lamps/snafu/>
build_flags =
	${env_base_upesy.build_flags}
	-D LAMP_BUILD_VARIANT_SNAFU=1
lib_deps =
	${env_base_upesy.lib_deps}
build_cache_dir =

